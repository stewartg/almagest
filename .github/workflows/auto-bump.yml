name: Auto-Bump Version and Tag

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      # prevent auto bump happening on git bot action
      - name: Check if commit is from Auto-Bump
        run: |
          if [[ "${{ github.event.head_commit.author.name }}" == "github-actions[bot]" ]]; then
            echo "Commit made by github-actions[bot]. Skipping auto-bump to prevent loop."
            exit 0 # Exits successfully, stopping the job here
          fi
          echo "Commit made by human. Proceeding with bump."
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # CRITICAL: Use the PAT instead of the default GITHUB_TOKEN
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: bump
        run: |
          cz bump --yes --annotated-tag || echo "NO_BUMP_NEEDED=true" >> $GITHUB_ENV

      - name: Push changes and tags
        if: env.NO_BUMP_NEEDED != 'true'
        run: |
          echo "Pushing with PAT to trigger downstream workflows..."
          
          # Push commit
          git push origin main
          
          sleep 2
          
          # Push tags (This will now trigger python-publish.yml because it's a "user" push)
          git push origin --tags
          
          echo "Push complete."
