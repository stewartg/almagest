name: Auto-Bump Version and Tag

on:
  push:
    branches:
      - main # Triggers after a PR is merged to main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Ensure we have write permissions to push the tag back
    permissions:
      contents: write 
      pull-requests: read # Good practice if you ever want to comment on the PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential: gets all history to calculate bump
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: bump
        run: |
          # Run bump. If no bump is needed, cz exits with 21. 
          # We catch this to allow the workflow to finish gracefully without erroring the whole pipeline.
          cz bump --yes --annotated-tag || echo "NO_BUMP_NEEDED=true" >> $GITHUB_ENV

      - name: Push changes and tags
        if: env.NO_BUMP_NEEDED != 'true'
        run: |
          echo "Version bumped. Pushing commit and tags separately to ensure trigger..."
          
          # push the version bump commit first
          git push origin main
          
          # wait to ensure GitHub processes the branch push event
          sleep 2
          
          # 3. Push the tags separately. 
          # This generates a distinct 'push' event specifically for tags, 
          # which reliably triggers the python-publish workflow.
          git push origin --tags
          
          echo "Push complete."
